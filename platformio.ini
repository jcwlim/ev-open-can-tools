[platformio]
default_envs =
    esp32_twai
    esp32s2_twai
    esp32_feather_v2_mcp2515
    lilygo_tcan485_hw3
    m5stack-atomic-can-base
    m5stack-atoms3-mini-can-base
    esp32_ext_mcp2515
    waveshare_ESP32_S3_RS485_CAN

[env:esp32_twai]
platform = espressif32
board = esp32dev
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DDASH_DEFAULT_HW=1
    -std=gnu++17
build_unflags = -std=gnu++11

[env:esp32s2_twai]
platform = espressif32
board = esp32-s2-saola-1
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DDASH_DEFAULT_HW=1
    -DREC_CAP=512
    -std=gnu++17
build_unflags = -std=gnu++11

board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:esp32_feather_v2_mcp2515]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
monitor_speed = 115200
build_flags =
    -DDRIVER_ESP32_EXT_MCP2515
    -DESP32_DASHBOARD
    -DPIN_CAN_CS=14
    -DPIN_CAN_INTERRUPT=32
    -DPIN_LED=13
    -DSPI_SCK=5
    -DSPI_MISO=21
    -DSPI_MOSI=19
    -DDASH_DEFAULT_HW=1
    -DMCP_CRYSTAL_FREQ=MCP_16MHZ
    -std=gnu++17
board_build.partitions = partitions_8mb_ota_3072k.csv
build_unflags = -std=gnu++11

[env:lilygo_tcan485_hw3]
platform = espressif32
board = esp32dev
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DTWAI_TX_PIN=GPIO_NUM_27
    -DTWAI_RX_PIN=GPIO_NUM_26
    -DPIN_LED=2
    -DDASH_DEFAULT_HW=1
    -std=gnu++17
build_unflags = -std=gnu++11
board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:m5stack-atomic-can-base]
platform = espressif32
board = m5stack-atom
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DPIN_LED=27
    -DDASH_RGB_STATUS_LED
    -DTWAI_TX_PIN=GPIO_NUM_22
    -DTWAI_RX_PIN=GPIO_NUM_19
    -DDASH_ALLOW_CAN_GPIO_6_11=1
    -DDASH_DEFAULT_HW=1
    -std=gnu++17
build_unflags = -std=gnu++11
board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:m5stack-atoms3-mini-can-base]
platform = espressif32
board = m5stack-atoms3
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DPIN_LED=35
    -DDASH_RGB_STATUS_LED
    -DDASH_INJECTION_TOGGLE_PIN=41
    -DTWAI_TX_PIN=GPIO_NUM_2
    -DTWAI_RX_PIN=GPIO_NUM_1
    -DDASH_ALLOW_CAN_GPIO_6_11=1
    -DDASH_DEFAULT_HW=1
    -std=gnu++17
build_unflags = -std=gnu++11
board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:esp32_ext_mcp2515]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
lib_deps = bblanchon/ArduinoJson@^7
extra_scripts = pre:scripts/platformio_sync_profile.py
build_flags =
    -DDRIVER_ESP32_EXT_MCP2515
    -DESP32_DASHBOARD
    -DPIN_LED=2
    -DPIN_CAN_CS=10
    -DPIN_CAN_INTERRUPT=9
    -DSPI_SCK=12
    -DSPI_MISO=13
    -DSPI_MOSI=11
    -DMCP_CRYSTAL_FREQ=MCP_8MHZ
    -std=gnu++17
board_build.partitions = partitions_8mb_ota_3072k.csv
build_unflags = -std=gnu++11
monitor_speed = 115200

[env:waveshare_ESP32_S3_RS485_CAN]
platform = espressif32
board = esp32s3box
framework = espidf
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DDASH_DEFAULT_HW=1
    -DTWAI_TX_PIN=GPIO_NUM_15
    -DTWAI_RX_PIN=GPIO_NUM_16
    -DPIN_LED=14
    -std=gnu++17
build_unflags = -std=gnu++11
board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:native]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
test_ignore =
    test_native_bypass_tlssc_requirement
    test_native_dashboard
    test_native_injection_after_ap
    test_native_mcp2515_recovery
    test_native_nag
    test_native_plugin_engine
    test_native_plugin_engine_custom_key
build_flags = -std=c++17 -DNATIVE_BUILD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DENHANCED_AUTOPILOT
test_filter = test_native_*

[env:native_dashboard]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DESP32_DASHBOARD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DBYPASS_TLSSC_REQUIREMENT -DENHANCED_AUTOPILOT -DNAG_KILLER
test_filter = test_native_dashboard

[env:native_bypass_tlssc_requirement]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DISA_SPEED_CHIME_SUPPRESS -DEMERGENCY_VEHICLE_DETECTION -DBYPASS_TLSSC_REQUIREMENT -DENHANCED_AUTOPILOT
test_filter = test_native_bypass_tlssc_requirement

[env:native_log_buffer]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_log_buffer

[env:native_mcp2515_recovery]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DPIN_CAN_INTERRUPT=2 -Itest/test_native_mcp2515_recovery
test_filter = test_native_mcp2515_recovery

[env:native_nag]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DNAG_KILLER
test_filter = test_native_nag

[env:native_injection_after_ap]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
build_flags = -std=c++17 -DNATIVE_BUILD -DENHANCED_AUTOPILOT -DINJECTION_AFTER_AP
test_filter = test_native_injection_after_ap

[env:native_plugin_engine]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags = -std=c++17 -DNATIVE_BUILD -DESP32_DASHBOARD -DPLUGIN_ENGINE_NATIVE_TEST
test_filter = test_native_plugin_engine

[env:native_plugin_engine_custom_key]
platform = native
extra_scripts = pre:scripts/platformio_native_env.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags = -std=c++17 -DNATIVE_BUILD -DESP32_DASHBOARD -DPLUGIN_ENGINE_NATIVE_TEST -DPLUGIN_GTW_UDS_KEY_READY=0xAB
test_filter = test_native_plugin_engine_custom_key
