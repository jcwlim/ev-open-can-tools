[env:feather_rp2040_can]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_feather_can
framework = arduino
extra_scripts = pre:scripts/platformio_sync_profile.py
board_build.core = earlephilhower
lib_deps = autowp/autowp-mcp2515
build_flags = -DDRIVER_MCP2515

[env:feather_m4_can]
platform = atmelsam
board = adafruit_feather_m4_can
framework = arduino
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = adafruit/Adafruit CAN
build_flags = -DDRIVER_SAME51 -std=gnu++17
build_unflags = -std=gnu++11

[env:esp32_twai]
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DDASH_DEFAULT_HW=1
    -std=gnu++17
build_unflags = -std=gnu++11

[env:esp32s2_twai]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps = bblanchon/ArduinoJson@^7
build_flags =
    -DDRIVER_TWAI
    -DESP32_DASHBOARD
    -DDASH_DEFAULT_HW=1
    -std=gnu++17
build_unflags = -std=gnu++11

board_build.partitions = partitions_4mb_ota_1536k.csv
monitor_speed = 115200

[env:esp32_feather_v2_mcp2515]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino
extra_scripts = pre:scripts/platformio_sync_profile.py
lib_deps =
    https://github.com/autowp/arduino-mcp2515
    bblanchon/ArduinoJson@^7
monitor_speed = 115200
build_flags =
    -DDRIVER_ESP32_EXT_MCP2515
    -DESP32_DASHBOARD
    -DPIN_CAN_CS=14
    -DPIN_CAN_INTERRUPT=32
    -DPIN_LED=13
    -DSPI_SCK=SCK
    -DSPI_MISO=MISO
    -DSPI_MOSI=MOSI
    -DDASH_DEFAULT_HW=1
    -DMCP_CRYSTAL_FREQ=MCP_16MHZ
    -std=gnu++17
board_build.partitions = default_8MB.csv
build_unflags = -std=gnu++11

